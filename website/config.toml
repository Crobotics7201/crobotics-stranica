[languages]
    [languages.en]
        description = "Official Crobotics #7201 website"
        fap = "Fast and productive"
        wassup = "What's new"
        shortDesc = "A small team of high school students aiming to compete at a high level with a tight budget."

        missionTitle = "Our Vision"
ourGoal1 = "We want to show everyone who competes that success does not depend on money and resources, but on passion, effort, and perseverance. We believe that with the right approach and mindset, anyone can achieve their goals, regardless of the conditions they come from. "
ourGoal2 = "Over the years, as a team, we have faced competitors with significantly greater resources, but that has not stopped us from achieving notable results. These experiences have further motivated us to keep improving and to believe in what we do. Our goal is to encourage others to believe in themselves and not give up when faced with challenges, because that is exactly what leads us toward greater success year after year. "

ourJourneyTitle = "Our Journey of Growth and Success"
ourJourney = "The Crobotics team was founded in 2017 at Andrija Mohorovičić High School in Rijeka, on the initiative of student Borna Massari, with the support of Prof. Patricija Nikolaus, Prof. Goran Boneta, and six other students. From the very beginning, the team has continuously developed, bringing together new generations of students and building a community based on knowledge, cooperation, and a passion for robotics. 
Already in 2018, we participated in the FIRST Robotics Competition in New York, where we won two awards: the Rookie Inspiration Award and the Highest Rookie Seed Award. In 2020, we competed in Istanbul and placed 22nd in Europe, and in 2023 we returned to Istanbul, where we achieved an outstanding 5th place, which was our greatest success at the time. 
Our journey continued in 2026 in Chicago, where, by winning 3rd place, we achieved a historic result and set a new standard for our team, once again showing how much effort, perseverance, and teamwork can pay off. "
       
        investorsTitle = "Backed by world-renowned investors"
        investorsText = "Of course, participating in competitions costs a lot of money, from buying materials to registration fees and travel expenses. Since our team is consisted of high school students and two mentors, collecting resources needed for paying everything was a tough job. We couldn't have done anything without our renowned investors: TSI d.o.o, LNG Hrvatska d.o.o., Infobip d.o.o., Faculty of Engineering in Rijeka (RITEH), Primorsko-goranska županija, Grad Rijeka and other."
        investorsLink = "Meet our investors"

        aboutText = "About"
        blogText = "Blog"
        readMoreText = "Read more about our adventures"
        newsText = "News"
        donateText = "Donate"
        contactText = "Contact"
        postsText = "Posts"
        catText = "Categories"

        copyrightText = "All rights reserved."
        plug1 = "This site was developed by"
        plug2 = "using"
        plug3 = "template as the starting ground."

