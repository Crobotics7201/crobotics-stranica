    [languages.hr]
        description = "Službena stranica Crobotics #7201"
        fap = "Učinkoviti i inovativni"
        wassup = "Novosti"
        shortDesc = "Mali tim srednjoškolaca s ciljem natjecanja na visokoj razini s ograničenim budžetom."

        missionTitle = "Naša vizija"
        ourGoal1 = "Želimo pokazati svima koji se natječu da uspjeh ne ovisi o novcu i resursima, već o strasti, trudu i upornosti. Vjerujemo da uz pravi pristup i način razmišljanja svatko može ostvariti svoje ciljeve, bez obzira na uvjete iz kojih dolazi. "
        ourGoal2 = "Kroz godine smo se kao tim suočavali s konkurencijom koja raspolaže znatno većim resursima, no to nas nije spriječilo da ostvarimo zapažene rezultate. Upravo ta iskustva dodatno su nas motivirala da nastavimo napredovati i vjerovati u ono što radimo. Naš cilj je potaknuti druge da vjeruju u sebe te da ne odustaju pred izazovima jer je upravo to ono što nas iz godine u godinu vodi prema sve većim uspjesima. "

        ourJourneyTitle = "Naš put rasta i uspjeh"
        ourJourney = "Crobotics tim osnovan je 2017. godine u Gimnaziji Andrije Mohorovičića Rijeka na inicijativu učenika Borne Massarija, uz podršku prof. Patricije Nikolaus, prof. Gorana Bonete i još šest učenika. Od samih početaka tim se kontinuirano razvija, okupljajući nove generacije učenika i gradeći zajednicu temeljenu na znanju, suradnji i strasti prema robotici. 
Već 2018. godine sudjelovali smo na FIRST Robotics Competitionu u New Yorku, gdje smo osvojili dvije nagrade: Rookie Inspiration Award i Highest Rookie Seed Award. Godine 2020. natjecali smo se u Istanbulu i zauzeli 22. mjesto u Europi, a 2023. ponovno smo nastupili u Istanbulu gdje smo ostvarili izvanredno 5. mjesto, što je tada bio naš najveći uspjeh. 
Naše putovanje nastavilo se i 2026. godine u Chicagu, gdje smo osvojivši 3. mjesto ostvarili povijesni rezultat te postavili novi standard za naš tim i još jednom pokazali koliko se trud, upornost i timski rad mogu isplatiti. "

        investorsTitle = "Uz podršku svjetski poznatih investitora"
        investorsText = "Naravno, sudjelovanje na natjecanjima košta puno novca, od kupnje materijala do kotizacija i putnih troškova. Budući da naš tim čine srednjoškolci i dva mentora, prikupljanje sredstava potrebnih za plaćanje svega je bio težak posao. Ništa ne bismo mogli bez naših renomiranih investitora: TSI d.o.o, LNG Hrvatska d.o.o., Infobip d.o.o., Tehnički fakultet u Rijeci (RITEH), Primorsko-goranska županija, Grad Rijeka i ostalih."
